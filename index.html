<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JASI | Cloud Exploit Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0c;
            --glass: rgba(15, 15, 18, 0.85);
            --accent: #e6192e;
            --text: #f0f0f0;
            --text-dim: #888;
        }

        body {
            margin: 0;
            background: var(--bg);
            font-family: 'Outfit', sans-serif;
            color: var(--text);
        }

        .navbar {
            padding: 20px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(230, 25, 46, 0.2);
            backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo { font-weight: 700; letter-spacing: 2px; color: var(--accent); }
        .nav-links span { margin-left: 30px; color: var(--text-dim); cursor: pointer; font-size: 0.9rem; text-transform: uppercase; }

        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }

        .header-panel {
            background: var(--glass);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 40px;
            border: 1px solid rgba(255,255,255,0.05);
            text-align: center;
        }

        .grid { display: grid; grid-template-columns: 1fr 2fr; gap: 30px; }

        /* Upload Form */
        .upload-card {
            background: var(--glass);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(230, 25, 46, 0.3);
            height: fit-content;
        }

        .upload-card h2 { margin-top: 0; font-size: 1.2rem; color: var(--accent); text-transform: uppercase; }

        input, textarea, select {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 12px;
            border-radius: 8px;
            color: white;
            margin-bottom: 15px;
            font-family: inherit;
            box-sizing: border-box;
        }

        textarea { height: 150px; resize: none; font-family: monospace; }

        .btn-main {
            width: 100%;
            background: var(--accent);
            border: none;
            color: white;
            padding: 12px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
        }

        /* Shared List */
        .list-card {
            background: var(--glass);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .item {
            background: rgba(255,255,255,0.02);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 15px;
            border-left: 4px solid var(--accent);
        }

        .item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .item-name { font-weight: 700; color: #fff; }
        .item-code { font-family: monospace; font-size: 0.85rem; color: #888; background: black; padding: 10px; border-radius: 6px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }

        .copy-link {
            color: var(--accent);
            font-size: 0.75rem;
            text-decoration: none;
            text-transform: uppercase;
            font-weight: 700;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">JASI HUB</div>
        <div class="nav-links">
            <span style="color: var(--accent)">Dashboard</span>
            <span>Cloud Logs</span>
        </div>
    </nav>

    <div class="container">
        <div class="header-panel">
            <h1>CLOUD GATEWAY</h1>
            <p>GitHub Synchronized Payload Delivery</p>
        </div>

        <div class="grid">
            <div class="upload-card">
                <h2>Local Sync</h2>
                <input type="text" id="scriptName" placeholder="Filename (e.g. exploit.lua)">
                <textarea id="scriptCode" placeholder="Code to be Encrypted & Shared..."></textarea>
                <button class="btn-main" onclick="processAndUpload()">Encrypt & Sync</button>
                
                <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 20px 0;">
                
                <h2>License Management</h2>
                <button class="btn-main" style="background: #222; border: 1px solid var(--accent);" onclick="generateKey()">Generate License Key</button>
                <div id="keyDisplay" style="margin-top: 10px; font-family: monospace; color: var(--accent); font-weight: 700; text-align: center;"></div>
            </div>

            <div class="list-card">
                <h2>GitHub Cloud Repository</h2>
                <div id="sharedList">
                    <div class="item">
                        <div class="item-header">
                            <span class="item-name">Master_Event_Scan.lua (Encrypted)</span>
                            <span class="copy-link" onclick="copyRawUrl('Master_Event_Scan.lua')">Copy Raw URL</span>
                        </div>
                        <div class="item-code">XOR_0x4F_53414a... (Encrypted Data)</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SECRET_KEY = 0x4F; // Your JASI Secret Key

        function xorEncrypt(text) {
            let res = "";
            for(let i=0; i<text.length; i++) {
                res += (text.charCodeAt(i) ^ SECRET_KEY).toString(16).padStart(2, "0");
            }
            return "XOR_0x4F_" + res;
        }

        function processAndUpload() {
            const name = document.getElementById('scriptName').value;
            const code = document.getElementById('scriptCode').value;
            const webhook = "https://canary.discord.com/api/webhooks/1496804510218190918/YUZITMlQDaoe88KcUPKMbT_AqzJJ7zJaYFdz9ebtucxoiqD1MyGt_SlhPQlaJmwkvN6M";

            if(!name || !code) return alert("Error: No data to sync.");

            const encrypted = xorEncrypt(code);
            const payload = {
                content = "ENCRYPTED CLOUD SYNC\nFilename: " + name + "\nKey: 0x4F\nPayload:\n" + encrypted
            };

            fetch(webhook, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).then(() => {
                alert("Successfully encrypted and synced to Discord!");
            });
        }

        function copyRawUrl(name) {
            const url = "https://raw.githubusercontent.com/YOUR_GITHUB_NAME/jasi-hub/main/" + name;
            navigator.clipboard.writeText(url);
            alert("URL Copied for JASI Menu!");
        }

        function generateKey() {
            const key = "JASI-" + Math.random().toString(36).substr(2, 4).toUpperCase() + "-" + Math.random().toString(36).substr(2, 4).toUpperCase();
            document.getElementById('keyDisplay').innerText = key;
            
            const webhook = "https://canary.discord.com/api/webhooks/1496804510218190918/YUZITMlQDaoe88KcUPKMbT_AqzJJ7zJaYFdz9ebtucxoiqD1MyGt_SlhPQlaJmwkvN6M";
            
            fetch(webhook, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    content: "NEW LICENSE KEY GENERATED\nKey: " + key + "\nUser: Admin Panel"
                })
            });
        }
    </script>
</body>
</html>
